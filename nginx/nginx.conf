events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name mutantmassapp.com www.mutantmassapp.com;

        # Redirect HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name mutantmassapp.com www.mutantmassapp.com;

        ssl_certificate /etc/letsencrypt/live/mutantmassapp.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mutantmassapp.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # API routes → Fastify
        location /api/ {
            proxy_pass http://server:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Uploads → Fastify
        location /uploads/ {
            proxy_pass http://server:3000/uploads/;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Everything else → React app
        location / {
            proxy_pass http://client:80;
            proxy_set_header Host $host;
        }
    }
}