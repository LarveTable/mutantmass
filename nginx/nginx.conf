events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name mutantmassapp.fr www.mutantmassapp.fr;

        # Redirect HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name mutantmassapp.fr www.mutantmassapp.fr;

        ssl_certificate /etc/letsencrypt/live/mutantmassapp.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mutantmassapp.fr/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Resolve Docker internal DNS
        resolver 127.0.0.11 valid=30s;

        # API routes → Fastify
        location /api/ {
            set $backend "http://server:3000";
            rewrite ^/api/(.*) /$1 break;
            proxy_pass $backend;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Uploads → Fastify
        location /uploads/ {
            set $uploads "http://server:3000";
            # We don't strip /uploads/ here because Fastify handles the /uploads path directly
            proxy_pass $uploads$request_uri;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Everything else → React app
        location / {
            set $frontend "http://client:80";
            proxy_pass $frontend$request_uri;
            proxy_set_header Host $host;
        }
    }
}